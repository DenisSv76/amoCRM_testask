<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login — Visits Dashboard</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,Helvetica,sans-serif;background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .login-box{background:#fff;padding:32px 28px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);width:100%;max-width:360px}
        h2{margin-bottom:20px;text-align:center;color:#333}
        label{display:block;margin-bottom:4px;font-size:14px;color:#555}
        input[type="text"],input[type="password"]{width:100%;padding:10px 12px;margin-bottom:16px;border:1px solid #d9d9d9;border-radius:4px;font-size:15px}
        button{width:100%;padding:10px;background:#1677ff;color:#fff;border:none;border-radius:4px;font-size:15px;cursor:pointer}
        button:hover{background:#4096ff}
        .error{color:#cf1322;margin-bottom:12px;text-align:center;font-size:14px}
        .link{text-align:center;margin-top:16px;font-size:14px;color:#666}
        .link a{color:#1677ff;text-decoration:none}
        .link a:hover{text-decoration:underline}
    </style>
</head>
<body>
<div class="login-box">
    <h2>Visits Dashboard</h2>
    <div id="error" class="error" style="display:none"></div>
    <form id="loginForm">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
        <button type="submit">Log in</button>
    </form>
    <div class="link">
        Don't have an account? <a href="/register">Register</a>
    </div>
</div>
<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const errEl = document.getElementById('error');
        errEl.style.display = 'none';
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (res.ok && data.ok) {
                window.location.href = '/dashboard';
            } else {
                errEl.textContent = data.error || 'Login failed';
                errEl.style.display = 'block';
            }
        } catch (err) {
            errEl.textContent = 'Network error. Please try again.';
            errEl.style.display = 'block';
        }
    });
</script>
</body>
</html>
